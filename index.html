<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visor Estereoscópico Anaglifo</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Estilos -->
  <link rel="stylesheet" href="css/styles.css">

  <!-- Icono -->
  <link rel="icon" href="img/icon.png">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-black border-bottom border-danger">
  <div class="container-fluid">
    <span class="navbar-brand text-danger fw-bold">
      🔴🔵 Visor Estereoscópico
    </span>
  </div>
</nav>

<div class="container mt-4">

  <!-- 🔥 NUEVA SECCIÓN MODERNA -->
  <div class="hero-section text-center mb-4">

    <h1 class="title-3d">
      🔴🔵 Visor Estereoscópico
    </h1>

    <p class="subtitle">
      Cambia entre <span class="highlight">Side by Side</span> y 
      <span class="highlight2">Anaglifo</span>
    </p>

    <div class="mode-buttons">
      <button class="btn-mode side-btn" onclick="setMode('side')">
        👀 Side by Side
      </button>

      <button class="btn-mode anaglyph-btn" onclick="setMode('anaglyph')">
        🔴🔵 Modo Anaglifo
      </button>
    </div>

  </div>

  <!-- CARRUSEL (NO SE TOCA) -->
  <div id="carouselExample" class="carousel slide" data-bs-ride="carousel">
    <div class="carousel-inner">

      <!-- IMAGEN 1 -->
      <div class="carousel-item active">
        <div class="text-center">
          <img class="stereo-img img-fluid"
               src="img/img1_sbs.jpg"
               data-side="img/img1_sbs.jpg"
               data-anaglyph="img/img1_anaglyph.jpg">
        </div>
      </div>

      <!-- IMAGEN 2 -->
      <div class="carousel-item">
        <div class="text-center">
          <img class="stereo-img img-fluid"
               src="img/img2_sbs.jpg"
               data-side="img/img2_sbs.jpg"
               data-anaglyph="img/img2_anaglyph.jpg">
        </div>
      </div>

      <!-- IMAGEN 3 -->
      <div class="carousel-item">
        <div class="text-center">
          <img class="stereo-img img-fluid"
               src="img/img3_sbs.jpg"
               data-side="img/img3_sbs.jpg"
               data-anaglyph="img/img3_anaglyph.jpg">
        </div>
      </div>

      <!-- (deja las demás igual hasta la 15) -->

    </div>

    <!-- CONTROLES -->
    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>
  </div>

</div>

<!-- FOOTER -->
<footer class="bg-black text-white text-center p-3 mt-4 border-top border-danger">
  Desarrollado por: Arely Tellez Salas
</footer>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>

</body>
</html>
